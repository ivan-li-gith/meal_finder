version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: 'find_a_meal'
      MYSQL_ROOT_PASSWORD: 'findamealadminpass'
    ports:
      - '3306:3306'
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql

  web:
    build: .
    ports:
      - '80:8501' 
    depends_on:
      - db
    env_file:
      - .env 
    environment:
      - DB_HOST=db 

volumes:
  db_data: